identity:
  identify_calls: []
  group_calls: []
  notes: "No external analytics SDK. User identity is managed via Telegram initData HMAC-SHA256 → JWT. userId (CUID) is attached to every Event record via foreign key. No identify() or group() calls exist because there is no external analytics destination."

  user_id_format: "CUID (Prisma default)"
  external_id: "telegramId (BigInt)"

patterns:
  naming_style: "snake_case consistently across all event types. Dynamic prefix pattern for notifications: 'notification:{type}'"
  centralized: "No centralized tracking wrapper. Each route/service/cron calls prisma.event.create() or prisma.event.createMany() directly."
  client_vs_server: "Server-only. All events are written server-side in API routes, services, cron jobs, and bot handler. No client-side (frontend) tracking."
  error_handling: "Events are awaited (blocking). No try/catch around event creation — a failed event write would propagate the error to the route handler's catch block."
  deduplication: "re-engagement and weekly-spark crons query existing events before creating new ones to prevent double-sending."

orphan_summary:
  total_orphaned: 3
  orphaned_events:
    - name: onboarding_start
      queried_in: daily-metrics.ts
      never_written: true
    - name: chat_opened
      queried_in: daily-metrics.ts, weekly-spark.ts
      never_written: true
    - name: verification_requested
      queried_in: admin.ts
      never_written: true
