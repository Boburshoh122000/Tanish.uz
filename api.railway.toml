[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @tanish/prisma build && pnpm --filter @tanish/shared build && pnpm --filter @tanish/api build"

[deploy]
startCommand = "pnpm --filter @tanish/prisma exec prisma migrate deploy && pnpm --filter @tanish/api start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
